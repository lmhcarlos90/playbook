---
- name: 从 Nexus 下载并部署 Spring Boot 应用
  hosts: app_servers
  #become: yes
  vars_files:
    - vars.yml
    - vars_secret.yml

  vars:
    # ===== 在这里指定你的 JDK 路径 =====
    java_path: "/Users/apple/Library/Java/JavaVirtualMachines/azul-17.0.19/Contents/Home/bin/java"
    # 部署目录（Mac 上建议放用户目录下）
    deploy_dir: "{{ ansible_facts['env']['HOME'] }}/apps/{{ app_name }}"
    backup_dir: "{{ deploy_dir }}/backup"

  tasks:
    # 创建备份目录
    - name: 创建备份文件夹
      file:
        path: "{{ backup_dir }}"
        state: directory
        mode: '0755'

    # 备份当前正在运行的旧Jar（核心备份逻辑）
    - name: 备份现有Jar包
      copy:
        src: "{{ deploy_dir }}/{{ jar_file }}"
        dest: "{{ backup_dir }}/{{ jar_file }}_bak_{{ ansible_date_time.iso8601_short }}"
        remote_src: true
      ignore_errors: true  # 首次部署无旧包，忽略报错
    # ========== 1. 环境准备 ==========
    - name: 确保 JDK 已安装
      yum:
        name: java-21-openjdk
        state: present
      when: ansible_os_family == "RedHat"

    - name: 创建应用目录
      file:
        path: "{{ deploy_dir }}"
        state: directory
        mode: '0755'

    # ========== 2. 从 Nexus 下载 JAR 包 ==========
    - name: 构建 Nexus 下载 URL
      set_fact:
        nexus_download_url: >-
          {{ nexus_url }}/repository/{{ nexus_repository }}/{{ app_group_id | replace('.', '/') }}/{{ app_artifact_id }}/{{ app_version }}/{{ app_artifact_id }}-{{ app_version }}.{{ app_packaging }}

    - name: 从 Nexus 下载 JAR 包
      get_url:
        url: "{{ nexus_download_url }}"
        dest: "{{ deploy_dir }}/{{ jar_file }}"
        url_username: "{{ nexus_username }}"
        url_password: "{{ nexus_password }}"
        force_basic_auth: yes
        mode: '0755'
      register: download_result

    - name: 显示下载结果
      debug:
        msg: "下载状态: {{ download_result.status_code }}, 包大小: {{ download_result.size | default('未知') }}"

    # ========== 3. 生成启动/停止脚本 ==========
    - name: 生成启动脚本
      template:
        src: templates/start.sh.j2
        dest: "{{ deploy_dir }}/start.sh"
        mode: '0755'

    - name: 生成停止脚本
      template:
        src: templates/stop.sh.j2
        dest: "{{ deploy_dir }}/stop.sh"
        mode: '0755'

    # ========== 4. 启动应用 ==========
    - name: 检查应用是否已在运行
      shell: "pgrep -f {{ jar_file }} || true"
      register: app_pid
      changed_when: false

    - name: 清理超过5个的旧备份
      shell: "ls -t {{ backup_dir }}/{{ jar_file }}_bak_* | tail +6 | xargs rm -f"
      ignore_errors: true

  # 5. 健康检查失败则触发回滚（Ansible block/rescue 语法）
  block:
    - name: 停止旧进程
      shell: "{{ deploy_dir }}/stop.sh"
    - name: 后台启动新版本
      shell: "nohup {{ deploy_dir }}/start.sh > {{ deploy_dir }}/app.log 2>&1 &"
    - name: 健康检查新版本
      uri:
        url: "http://host.docker.internal:8188/api/healthCheck"
        status_code: 200
      retries: 10
      delay: 3
  rescue:
    # 【回滚核心】健康检查失败自动执行
    - name: 新版本启动失败，执行回滚
      shell: "{{ deploy_dir }}/stop.sh"
    - name: 恢复备份旧Jar
      shell: "cp $(ls -t {{ backup_dir }}/{{ jar_file }}_bak_* | head -1) {{ deploy_dir }}/{{ jar_file }}"
    - name: 重启旧版本应用
      shell: "nohup {{ deploy_dir }}/start.sh > {{ deploy_dir }}/app.log 2>&1 &"
    - name: 回滚完成提示
      debug:
        msg: "❌ 新版本启动失败，已自动回滚至上一个可用版本"